services:
  db:
    image: postgres:15-alpine
    container_name: verisonic_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: verisonic
      TZ: UTC
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: verisonic_redis
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - TZ=UTC
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always

  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: verisonic_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: UTC
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verisonic_backend
    ports:
      - "127.0.0.1:8001:8001"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./backend:/app
      - ./cert:/app/cert:ro
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SECRET_KEY=${SECRET_KEY:-dev-local-secret-key-change-before-production-deploy!!}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-verisonic}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-verisonic-audio}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - LYRICS_EXTRACTION_ENABLED=${LYRICS_EXTRACTION_ENABLED:-false}
      - LYRICS_API_URL=${LYRICS_API_URL:-https://lrclib.net/api}
      - LALAL_API_KEY=${LALAL_API_KEY:-}
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID:-}
      - GOOGLE_VERTEX_LOCATION=${GOOGLE_VERTEX_LOCATION:-us-central1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - TZ=${TZ:-UTC}
      - WEBRTC_BUFFER_SEC=${WEBRTC_BUFFER_SEC:-3}
    depends_on:
      - db
      - redis
      - minio
    restart: always

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verisonic_worker
    command: celery -A celery_worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./cert:/app/cert:ro
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SECRET_KEY=${SECRET_KEY:-dev-local-secret-key-change-before-production-deploy!!}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-verisonic}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-verisonic-audio}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - LYRICS_EXTRACTION_ENABLED=${LYRICS_EXTRACTION_ENABLED:-false}
      - LYRICS_API_URL=${LYRICS_API_URL:-https://lrclib.net/api}
      - LALAL_API_KEY=${LALAL_API_KEY:-}
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID:-}
      - GOOGLE_VERTEX_LOCATION=${GOOGLE_VERTEX_LOCATION:-us-central1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - TZ=${TZ:-UTC}
    depends_on:
      - db
      - redis
      - minio
    restart: always

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verisonic_beat
    command: celery -A celery_worker.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
      - ./cert:/app/cert:ro
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SECRET_KEY=${SECRET_KEY:-dev-local-secret-key-change-before-production-deploy!!}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-verisonic}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-verisonic-audio}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - LYRICS_EXTRACTION_ENABLED=${LYRICS_EXTRACTION_ENABLED:-false}
      - LYRICS_API_URL=${LYRICS_API_URL:-https://lrclib.net/api}
      - LALAL_API_KEY=${LALAL_API_KEY:-}
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID:-}
      - GOOGLE_VERTEX_LOCATION=${GOOGLE_VERTEX_LOCATION:-us-central1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - TZ=${TZ:-UTC}
    depends_on:
      - db
      - redis
      - worker
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: verisonic_frontend
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - VITE_API_URL=/api
      - TZ=UTC
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: verisonic_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=UTC
    depends_on:
      - frontend
      - backend
      - minio
    restart: always

volumes:
  postgres_data:
  redis_data:
  minio_data:
