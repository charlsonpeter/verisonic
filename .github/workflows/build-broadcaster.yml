name: Build Broadcaster

on:
  push:
    paths:
      - 'broadcaster/**'
      - '.github/workflows/build-broadcaster.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: verisonic-broadcaster-windows-installer
          - os: ubuntu-20.04
            platform: linux
            artifact_name: verisonic-broadcaster-linux-installer
          - os: macos-13
            platform: macos
            artifact_name: verisonic-broadcaster-macos-installer

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 libasound2-dev libegl1 libxkbcommon-x11-0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r broadcaster/requirements.txt

      - name: Generate Icon Assets
        run: |
          python broadcaster/generate_icons.py

      - name: Build Executable (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --noconsole --onefile --windowed --distpath broadcaster/dist --workpath broadcaster/build/pyinstaller --specpath broadcaster/build --icon="broadcaster/assets/icon.ico" --name="VeriSonic Broadcaster" broadcaster/verisonic_broadcaster.py

      - name: Build Executable (Linux)
        if: matrix.platform == 'linux'
        run: |
          pyinstaller --noconsole --onefile --distpath broadcaster/dist --workpath broadcaster/build/pyinstaller --specpath broadcaster/build --icon="broadcaster/assets/icon.png" --name="verisonic-broadcaster" broadcaster/verisonic_broadcaster.py

      - name: Build macOS Installer
        if: matrix.platform == 'macos'
        run: |
          chmod +x broadcaster/installer/macos/build_macos_pkg.sh
          VERISONIC_PKG_VERSION=1.0.0 broadcaster/installer/macos/build_macos_pkg.sh

      - name: Install Inno Setup (Windows)
        if: matrix.platform == 'windows'
        run: choco install innosetup -y --no-progress

      - name: Build Windows Installer
        if: matrix.platform == 'windows'
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" broadcaster/installer/windows/setup.iss

      - name: Build Linux Installer
        if: matrix.platform == 'linux'
        run: |
          chmod +x broadcaster/installer/linux/build_deb.sh
          broadcaster/installer/linux/build_deb.sh

      - name: Upload Windows Installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: broadcaster/dist/VeriSonic_Broadcaster_Setup.exe

      - name: Upload macOS Installer
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: broadcaster/dist/VeriSonic Broadcaster.pkg

      - name: Upload Linux Installer
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: broadcaster/dist/verisonic-broadcaster_1.0.0_amd64.deb
